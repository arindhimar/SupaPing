name: SupaPing - Supabase Keep-Alive

on:
  schedule:
    - cron: "0 0 */3 * *"
  workflow_dispatch:

jobs:
  ping:
    name: Ping Supabase Services
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ping all services
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "=================================================="
          echo "  SupaPing - Keep-Alive Run"
          echo "  Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "=================================================="

          PASS=0
          FAIL=0
          COUNT=$(jq '. | length' services.json)

          for i in $(seq 0 $((COUNT - 1))); do
            NAME=$(jq -r ".[$i].name" services.json)
            URL=$(jq -r ".[$i].url" services.json)
            METHOD=$(jq -r ".[$i].method // \"GET\"" services.json)
            AUTH_SECRET=$(jq -r ".[$i].auth_secret // \"\"" services.json)

            echo ""
            echo "-> Pinging: $NAME"
            echo "   URL    : $URL"
            echo "   Method : $METHOD"
            echo "   Time   : $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

            # Build curl command
            CURL_CMD="curl -s -o /tmp/ping_response.txt -w \"%{http_code}\" \
              --max-time 15 \
              --retry 3 \
              --retry-delay 5 \
              -X $METHOD"

            # Add auth headers if an auth secret key name is specified
            if [ -n "$AUTH_SECRET" ] && [ "$AUTH_SECRET" != "null" ]; then
              # Resolve the secret value dynamically by name
              SECRET_VALUE=$(printenv "$AUTH_SECRET" || echo "")
              if [ -n "$SECRET_VALUE" ]; then
                CURL_CMD="$CURL_CMD \
                  -H \"Authorization: Bearer $SECRET_VALUE\" \
                  -H \"apikey: $SECRET_VALUE\""
              fi
            fi

            # Add Content-Type for POST
            if [ "$METHOD" = "POST" ]; then
              CURL_CMD="$CURL_CMD \
                -H \"Content-Type: application/json\" \
                --data '{\"name\":\"Functions\"}'"
            fi

            CURL_CMD="$CURL_CMD \"$URL\""

            HTTP_CODE=$(eval $CURL_CMD)
            BODY=$(cat /tmp/ping_response.txt)

            echo "   Status : HTTP $HTTP_CODE"
            echo "   Body   : $BODY"

            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
              echo "   Result : [OK]"
              PASS=$((PASS + 1))
            else
              echo "   Result : [FAILED] (HTTP $HTTP_CODE)"
              FAIL=$((FAIL + 1))
            fi

          done

          echo ""
          echo "=================================================="
          echo "  Summary: $PASS passed / $FAIL failed"
          echo "=================================================="

          if [ "$FAIL" -gt 0 ]; then
            exit 1
          fi
